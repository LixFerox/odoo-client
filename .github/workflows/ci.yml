name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.3.6", "latest"]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run check
        run: bun run check

  typecheck:
    name: Typecheck (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.3.6", "latest"]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

  test:
    name: Test (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.3.6", "latest"]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

  build:
    name: Build (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.3.6", "latest"]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Check build artifacts
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Error: dist/index.js not found"
            exit 1
          fi
          if [ ! -f "dist/index.d.ts" ]; then
            echo "Error: dist/index.d.ts not found"
            exit 1
          fi
          echo "All build artifacts are present"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.bun-version }}
          path: dist/
          retention-days: 7

  integration-odoo:
    name: Integration Odoo (Bun latest)
    runs-on: ubuntu-latest
    if: ${{ secrets.ODOO_TEST_BASE_URL != '' && secrets.ODOO_TEST_DATABASE != '' && secrets.ODOO_TEST_EMAIL != '' && secrets.ODOO_TEST_API_KEY != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests (Odoo)
        env:
          ODOO_TEST_BASE_URL: ${{ secrets.ODOO_TEST_BASE_URL }}
          ODOO_TEST_DATABASE: ${{ secrets.ODOO_TEST_DATABASE }}
          ODOO_TEST_EMAIL: ${{ secrets.ODOO_TEST_EMAIL }}
          ODOO_TEST_API_KEY: ${{ secrets.ODOO_TEST_API_KEY }}
          ODOO_TEST_COMPANY_ID: ${{ secrets.ODOO_TEST_COMPANY_ID }}
        run: bun test tests/odoo-client.integration.test.ts

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [check, typecheck, test, build, integration-odoo]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.check.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more required CI jobs failed"
            exit 1
          fi

          if [[ "${{ needs.integration-odoo.result }}" != "success" && \
                "${{ needs.integration-odoo.result }}" != "skipped" ]]; then
            echo "Integration job failed"
            exit 1
          fi

          echo "All CI jobs passed successfully"
